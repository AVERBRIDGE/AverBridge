<svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#38D9C9"/>
    </linearGradient>
    <!-- Dark background fill -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#161E30"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="20" cy="20" r="20" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="20" cy="20" r="18.5" stroke="url(#g)" stroke-width="1" opacity="0.3"/>

  <!-- Bridge arc -->
  <path d="M7 26 Q20 8 33 26" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Bridge deck -->
  <line x1="7" y1="26" x2="33" y2="26" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left cable -->
  <line x1="12" y1="26" x2="16" y2="18" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Right cable -->
  <line x1="28" y1="26" x2="24" y2="18" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Pier nodes -->
  <circle cx="7" cy="26" r="2.5" fill="url(#g)"/>
  <circle cx="33" cy="26" r="2.5" fill="url(#g)"/>

  <!-- Apex node -->
  <circle cx="20" cy="11" r="2.5" fill="url(#g)"/>
  <circle cx="20" cy="11" r="1" fill="white" opacity="0.7"/>
</svg>
