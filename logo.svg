<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#38D9C9"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#161E30"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="60" cy="60" r="60" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="56" stroke="url(#grad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Bridge arc -->
  <path d="M20 78 Q60 24 100 78" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Bridge deck -->
  <line x1="20" y1="78" x2="100" y2="78" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>

  <!-- Left suspension cable -->
  <line x1="36" y1="78" x2="48" y2="54" stroke="url(#grad)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Center-left cable -->
  <line x1="54" y1="78" x2="57" y2="40" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Center-right cable -->
  <line x1="66" y1="78" x2="63" y2="40" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Right suspension cable -->
  <line x1="84" y1="78" x2="72" y2="54" stroke="url(#grad)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Left pier -->
  <circle cx="20" cy="78" r="7" fill="url(#grad)"/>
  <circle cx="20" cy="78" r="3" fill="white" opacity="0.25"/>

  <!-- Right pier -->
  <circle cx="100" cy="78" r="7" fill="url(#grad)"/>
  <circle cx="100" cy="78" r="3" fill="white" opacity="0.25"/>

  <!-- Apex node -->
  <circle cx="60" cy="32" r="8" fill="url(#grad)"/>
  <circle cx="60" cy="32" r="3.5" fill="white" opacity="0.5"/>

  <!-- Inner glow at apex -->
  <circle cx="60" cy="32" r="1.5" fill="white" opacity="0.9"/>
</svg>
