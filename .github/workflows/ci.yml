name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type-check ──────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npm run type-check

  # ── 2. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint -- --max-warnings 0

  # ── 3. Build ───────────────────────────────────────────────────────────────
  build:
    name: Vite build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_NETWORK: testnet
          VITE_STELLAR_RPC_URL: https://horizon-testnet.stellar.org
          VITE_ETHEREUM_RPC_URL: https://rpc.sepolia.org
          VITE_SOLANA_RPC_URL: https://api.devnet.solana.com
          VITE_BNB_RPC_URL: https://data-seed-prebsc-1-s1.bnbchain.org:8545

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 4. Bundle size report ──────────────────────────────────────────────────
  bundle-size:
    name: Bundle size
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_NETWORK: testnet

      - name: Report bundle sizes
        run: |
          echo "## Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size | Gzip |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          find dist/assets -name "*.js" -o -name "*.css" | sort | while read f; do
            SIZE=$(du -sh "$f" | cut -f1)
            GZIP=$(gzip -c "$f" | wc -c | awk '{printf "%.1fK", $1/1024}')
            echo "| $(basename $f) | $SIZE | $GZIP |" >> $GITHUB_STEP_SUMMARY
          done
